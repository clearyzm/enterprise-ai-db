services:
  postgres_test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: enterprise_ai_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_ai_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
